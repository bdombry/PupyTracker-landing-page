<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" fill="#3B82F6" rx="24"/>
  
  <!-- Puppy head -->
  <circle cx="60" cy="55" r="32" fill="#F5DEB3"/>
  
  <!-- Left ear -->
  <ellipse cx="38" cy="22" rx="14" ry="20" fill="#D4A574" transform="rotate(-20 38 22)"/>
  
  <!-- Right ear -->
  <ellipse cx="82" cy="22" rx="14" ry="20" fill="#D4A574" transform="rotate(20 82 22)"/>
  
  <!-- Snout -->
  <ellipse cx="60" cy="65" rx="16" ry="14" fill="#F5DEB3"/>
  
  <!-- Nose -->
  <circle cx="60" cy="62" r="5" fill="#333"/>
  
  <!-- Left eye -->
  <circle cx="52" cy="48" r="4" fill="#333"/>
  <circle cx="53" cy="47" r="1.5" fill="#FFF"/>
  
  <!-- Right eye -->
  <circle cx="68" cy="48" r="4" fill="#333"/>
  <circle cx="69" cy="47" r="1.5" fill="#FFF"/>
  
  <!-- Mouth -->
  <path d="M 60 62 Q 56 68 52 66" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 60 62 Q 64 68 68 66" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Tongue -->
  <ellipse cx="60" cy="72" rx="6" ry="4" fill="#FF69B4"/>
  
  <!-- Spot on head -->
  <circle cx="50" cy="35" r="8" fill="#D4A574" opacity="0.6"/>
</svg>